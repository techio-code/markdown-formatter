<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 整形ツール | techio-code</title>
  <meta name="description" content="テキストを貼り付けるだけで見出し・箇条書きを自動検出しMarkdownに整形。Zenn/note/GitHub対応・行末スペース削除・リアルタイムプレビュー。">
  <meta property="og:title" content="Markdown 整形ツール">
  <meta property="og:description" content="テキスト → Markdown 自動整形。Zenn/note対応・行末スペース削除・1クリックコピー。">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ===== Design Tokens ===== */
    :root {
      --paper:   #F7F6F2;
      --ink:     #1A1A1A;
      --coffee:  #8B6F47;
      --stone:   #6B6B66;
      --tan:     #D4C9B8;
      --tan-lt:  #EAE4DA;
      --white:   #FFFFFF;
      --success: #2E9E6B;
      --primary: #4F46E5;

      --font-sans: 'Noto Sans JP', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --header-h: 52px;
      --toolbar-h: 40px;
      --statusbar-h: 32px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font-sans);
      background: var(--paper);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== Header ===== */
    header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--white);
      border-bottom: 1px solid var(--tan);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-accent {
      width: 2px;
      height: 18px;
      background: var(--coffee);
      border-radius: 1px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink);
      line-height: 1;
    }

    .header-sub {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--stone);
      margin-top: 3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-header {
      height: 32px;
      padding: 0 14px;
      border: none;
      border-radius: 6px;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .btn-copy-header {
      background: var(--ink);
      color: var(--white);
    }
    .btn-copy-header:hover { background: var(--coffee); }
    .btn-copy-header.copied { background: var(--success); }

    .btn-dl-header {
      background: transparent;
      color: var(--stone);
      border: 1px solid var(--tan);
    }
    .btn-dl-header:hover { border-color: var(--ink); color: var(--ink); }

    /* ===== Options bar ===== */
    .options-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      height: 38px;
      background: var(--white);
      border-bottom: 1px solid var(--tan-lt);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .opt-check {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--stone);
      cursor: pointer;
      white-space: nowrap;
    }
    .opt-check input[type="checkbox"] {
      cursor: pointer;
      accent-color: var(--coffee);
      width: 13px;
      height: 13px;
    }

    .opt-sep {
      width: 1px;
      height: 16px;
      background: var(--tan);
      flex-shrink: 0;
    }

    .opt-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--stone);
      white-space: nowrap;
    }
    .opt-label select {
      height: 26px;
      padding: 0 6px;
      border: 1px solid var(--tan);
      border-radius: 4px;
      font-family: var(--font-sans);
      font-size: 12px;
      background: var(--white);
      color: var(--ink);
      cursor: pointer;
    }

    /* ===== Main workspace ===== */
    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      min-height: 0;
    }

    /* ===== Panel base ===== */
    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--white);
    }

    .panel-left {
      border-right: 1px solid var(--tan);
    }

    /* ===== Panel header ===== */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--toolbar-h);
      padding: 0 14px 0 16px;
      border-bottom: 1px solid var(--tan-lt);
      background: var(--paper);
      flex-shrink: 0;
    }

    .panel-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--stone);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      border-radius: 100px;
      background: rgba(139,111,71,0.1);
      color: var(--coffee);
      font-weight: 500;
    }

    /* ===== Format button ===== */
    .btn-format-sm {
      height: 26px;
      padding: 0 12px;
      background: var(--ink);
      color: var(--white);
      border: none;
      border-radius: 5px;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-format-sm:hover { background: var(--coffee); }

    /* ===== Insert toolbar ===== */
    .insert-toolbar {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 0 10px;
      height: 34px;
      border-bottom: 1px solid var(--tan-lt);
      background: #FAFAF7;
      flex-shrink: 0;
      overflow-x: auto;
    }

    .ins-btn {
      height: 24px;
      padding: 0 8px;
      background: var(--white);
      border: 1px solid var(--tan);
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--stone);
      cursor: pointer;
      transition: all 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ins-btn:hover { background: var(--ink); color: var(--white); border-color: var(--ink); }

    .ins-sep {
      width: 1px;
      height: 16px;
      background: var(--tan);
      flex-shrink: 0;
      margin: 0 2px;
    }

    /* ===== Textarea ===== */
    .input-area {
      flex: 1;
      width: 100%;
      padding: 14px 16px;
      background: var(--white);
      border: none;
      outline: none;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.75;
      color: var(--ink);
      resize: none;
      overflow-y: auto;
    }
    .input-area::placeholder { color: var(--tan); }

    /* ===== Status bar (bottom of left panel) ===== */
    .panel-statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--statusbar-h);
      padding: 0 14px;
      border-top: 1px solid var(--tan-lt);
      background: var(--paper);
      flex-shrink: 0;
    }

    .statusbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-msg {
      font-size: 11px;
      color: var(--stone);
    }
    .status-msg.ok   { color: var(--success); font-weight: 600; }
    .status-msg.err  { color: #D94F4F; font-weight: 600; }

    .statusbar-right {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--stone);
      letter-spacing: 0.06em;
    }

    /* ===== Output tabs ===== */
    .tab-row {
      display: flex;
      border-bottom: 1px solid var(--tan-lt);
      flex-shrink: 0;
      background: var(--paper);
    }

    .tab-btn {
      height: var(--toolbar-h);
      padding: 0 20px;
      border: none;
      background: transparent;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      color: var(--stone);
      cursor: pointer;
      letter-spacing: 0.06em;
      position: relative;
      transition: color 0.15s;
    }

    .tab-btn.active {
      color: var(--ink);
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--coffee);
    }

    .tab-btn:not(.active):hover { color: var(--ink); }

    /* ===== Output area ===== */
    .output-body {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .output-raw {
      display: none;
      width: 100%;
      height: 100%;
      padding: 14px 16px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.75;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
      overflow-y: auto;
      background: var(--white);
    }
    .output-raw.active { display: block; }

    .output-raw .placeholder {
      color: var(--tan);
      font-style: italic;
    }

    .output-preview {
      display: none;
      width: 100%;
      height: 100%;
      padding: 18px 20px;
      overflow-y: auto;
      background: var(--white);
    }
    .output-preview.active { display: block; }

    /* Preview Markdown styles */
    .output-preview h1 {
      font-size: 22px; font-weight: 700; margin: 20px 0 10px;
      border-bottom: 2px solid var(--tan); padding-bottom: 6px;
      line-height: 1.4;
    }
    .output-preview h2 {
      font-size: 18px; font-weight: 700; margin: 18px 0 8px;
      border-bottom: 1px solid var(--tan-lt); padding-bottom: 4px;
      line-height: 1.4;
    }
    .output-preview h2::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 16px;
      background: var(--coffee);
      border-radius: 1px;
      margin-right: 8px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }
    .output-preview h3 {
      font-size: 15px; font-weight: 700; margin: 14px 0 6px;
      color: var(--coffee);
    }
    .output-preview h4 { font-size: 14px; font-weight: 600; margin: 10px 0 5px; }
    .output-preview p  { margin: 6px 0; line-height: 1.85; font-size: 14px; }
    .output-preview ul, .output-preview ol {
      margin: 6px 0 6px 20px; font-size: 14px;
    }
    .output-preview li { margin: 3px 0; line-height: 1.75; }
    .output-preview code {
      background: var(--paper);
      border: 1px solid var(--tan-lt);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .output-preview pre {
      background: #282C34;
      border-radius: 6px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .output-preview pre code {
      background: none;
      border: none;
      padding: 0;
      color: #ABB2BF;
      font-size: 12px;
    }
    .output-preview blockquote {
      border-left: 3px solid var(--coffee);
      margin: 10px 0;
      padding: 4px 14px;
      color: var(--stone);
      font-size: 14px;
      background: rgba(139,111,71,0.04);
      border-radius: 0 4px 4px 0;
    }
    .output-preview hr {
      border: none; border-top: 1px solid var(--tan); margin: 16px 0;
    }
    .output-preview strong { font-weight: 700; }
    .output-preview em { font-style: italic; }
    .output-preview a { color: var(--primary); text-decoration: underline; }

    /* ===== Output statusbar ===== */
    .output-statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--statusbar-h);
      padding: 0 14px;
      border-top: 1px solid var(--tan-lt);
      background: var(--paper);
      flex-shrink: 0;
    }

    .stat-chips {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-chip {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--stone);
      letter-spacing: 0.06em;
    }

    .chip-sep { color: var(--tan); }

    /* ===== Footer ===== */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 36px;
      border-top: 1px solid var(--tan);
      background: var(--white);
      flex-shrink: 0;
    }

    .footer-left {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--stone);
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-footer {
      height: 24px;
      padding: 0 10px;
      border: 1px solid var(--tan);
      border-radius: 4px;
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--stone);
      background: var(--white);
      cursor: pointer;
      transition: all 0.12s;
    }
    .btn-footer:hover { border-color: var(--ink); color: var(--ink); }

    /* ===== Mobile ===== */
    @media (max-width: 720px) {
      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }
      .panel-left {
        border-right: none;
        border-bottom: 1px solid var(--tan);
      }
      .options-bar {
        height: auto;
        padding: 8px 16px;
        gap: 10px;
      }
      header { padding: 0 16px; }
      footer  { padding: 0 16px; }
      .header-sub { display: none; }
    }
  </style>
</head>
<body>

<!-- ===== Header ===== -->
<header>
  <div class="header-left">
    <div class="header-accent"></div>
    <div>
      <div class="header-title">Markdown 整形ツール</div>
      <div class="header-sub">テキスト &rarr; Markdown &middot; Zenn &middot; note &middot; GitHub</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-header btn-copy-header" id="btnCopyHeader">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.5"/></svg>
      コピー
    </button>
    <button class="btn-header btn-dl-header" id="btnDownload">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2v8m0 0l-3-3m3 3l3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      .md 保存
    </button>
  </div>
</header>

<!-- ===== Options bar ===== -->
<div class="options-bar">
  <label class="opt-check">
    <input type="checkbox" id="chkTrimTrail" checked>
    行末スペース削除
  </label>
  <label class="opt-check">
    <input type="checkbox" id="chkHeading" checked>
    見出し自動検出
  </label>
  <label class="opt-check">
    <input type="checkbox" id="chkBullet" checked>
    箇条書き変換
  </label>
  <label class="opt-check">
    <input type="checkbox" id="chkBlankLines" checked>
    連続空行圧縮
  </label>
  <label class="opt-check">
    <input type="checkbox" id="chkAutoLink" checked>
    URL自動リンク
  </label>
  <div class="opt-sep"></div>
  <label class="opt-label">
    見出しレベル:
    <select id="selHeadingLevel">
      <option value="2">## (H2)</option>
      <option value="1"># (H1)</option>
      <option value="3">### (H3)</option>
    </select>
  </label>
  <div class="opt-sep"></div>
  <button class="btn-footer" id="btnExample">サンプル</button>
  <button class="btn-footer" id="btnClear">クリア</button>
</div>

<!-- ===== Workspace ===== -->
<div class="workspace">

  <!-- Left Panel: Input -->
  <div class="panel panel-left">
    <div class="panel-header">
      <div class="panel-label">
        入力
        <span class="panel-badge">プレーンテキスト</span>
      </div>
      <button class="btn-format-sm" id="btnFormat">整形する</button>
    </div>

    <!-- Insert toolbar -->
    <div class="insert-toolbar">
      <button class="ins-btn" data-insert="# ">H1</button>
      <button class="ins-btn" data-insert="## ">H2</button>
      <button class="ins-btn" data-insert="### ">H3</button>
      <div class="ins-sep"></div>
      <button class="ins-btn" data-insert="**太字**"><b>B</b></button>
      <button class="ins-btn" data-insert="*斜体*"><i>I</i></button>
      <button class="ins-btn" data-insert="~~取消線~~"><s>S</s></button>
      <div class="ins-sep"></div>
      <button class="ins-btn" data-insert="- ">- リスト</button>
      <button class="ins-btn" data-insert="1. ">1. 番号</button>
      <div class="ins-sep"></div>
      <button class="ins-btn" data-insert="> ">引用</button>
      <button class="ins-btn" data-insert="`コード`">`code`</button>
      <button class="ins-btn" data-insert="```\n\n```">```block</button>
      <div class="ins-sep"></div>
      <button class="ins-btn" data-insert="[テキスト](URL)">[link]</button>
      <button class="ins-btn" data-insert="---">---</button>
    </div>

    <textarea
      class="input-area"
      id="inputArea"
      placeholder="ここにテキストをペースト&#10;&#10;例：&#10;1. はじめに&#10;・概要説明&#10;・背景と目的&#10;2. 本題&#10;　内容をここに書く"
    ></textarea>

    <div class="panel-statusbar">
      <div class="statusbar-left">
        <button class="btn-footer" id="btnPaste">ペースト</button>
        <span class="status-msg" id="statusMsg">テキストを入力して「整形する」を押してください</span>
      </div>
      <div class="statusbar-right" id="inputStats"></div>
    </div>
  </div>

  <!-- Right Panel: Output -->
  <div class="panel">
    <div class="tab-row">
      <button class="tab-btn active" data-view="raw">Markdown</button>
      <button class="tab-btn" data-view="preview">プレビュー</button>
    </div>

    <div class="output-body">
      <div class="output-raw active" id="outputRaw">
        <span class="placeholder">整形結果がここに表示されます</span>
      </div>
      <div class="output-preview" id="outputPreview"></div>
    </div>

    <div class="output-statusbar">
      <div class="stat-chips" id="statChips">
        <span class="stat-chip" id="statLines">—</span>
        <span class="chip-sep">·</span>
        <span class="stat-chip" id="statChars">—</span>
        <span class="chip-sep">·</span>
        <span class="stat-chip" id="statHeadings">見出し 0</span>
        <span class="chip-sep">·</span>
        <span class="stat-chip" id="statBullets">箇条書き 0</span>
      </div>
      <button class="btn-footer" id="btnCopyHtml">HTML コピー</button>
    </div>
  </div>

</div>

<!-- ===== Footer ===== -->
<footer>
  <div class="footer-left">techio-code — Markdown Formatter v2.0</div>
  <div class="footer-right">
    <span style="font-family:var(--font-mono);font-size:9px;color:var(--stone);letter-spacing:0.1em;text-transform:uppercase;">Zenn · note · GitHub 対応</span>
  </div>
</footer>

<script>
  // ===== State =====
  let currentView = 'raw';
  let lastFormatted = '';

  // ===== Tab switch =====
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;
      updateOutputView();
    });
  });

  function updateOutputView() {
    const raw  = document.getElementById('outputRaw');
    const prev = document.getElementById('outputPreview');
    if (currentView === 'raw') {
      raw.classList.add('active');
      prev.classList.remove('active');
    } else {
      raw.classList.remove('active');
      prev.classList.add('active');
      if (lastFormatted) {
        prev.innerHTML = renderMarkdown(lastFormatted);
      }
    }
  }

  // ===== Format core =====
  function formatMarkdown(input) {
    const trimTrail = document.getElementById('chkTrimTrail').checked;
    const doHeading = document.getElementById('chkHeading').checked;
    const doBullet  = document.getElementById('chkBullet').checked;
    const doBlank   = document.getElementById('chkBlankLines').checked;
    const doLink    = document.getElementById('chkAutoLink').checked;
    const headLevel = '#'.repeat(parseInt(document.getElementById('selHeadingLevel').value));

    let lines = input.split(/\r\n|\r|\n/);

    lines = lines.map(line => {
      if (trimTrail) line = line.trimEnd();

      const leadFull = line.match(/^[　\s]+/);
      if (leadFull) line = line.trimStart();

      if (doBullet) {
        line = line.replace(/^[・●○□◆◇▶▷➡✅✔︎✓➤▸▹►]+\s*/, '- ');
        line = line.replace(/^[－ーｰ—–]\s+/, '- ');
      }

      if (doHeading) {
        const numDot   = line.match(/^(\d+)[.．。]\s+(.+)/);
        const numParen = line.match(/^[（(](\d+)[）)]\s*(.+)/);
        const zenNum   = line.match(/^[１２３４５６７８９０]+[.．。、]\s*(.+)/);

        if (numDot && !line.startsWith('- ')) {
          line = `${headLevel} ${numDot[2]}`;
        } else if (numParen) {
          line = `${headLevel} ${numParen[2]}`;
        } else if (zenNum) {
          line = `${headLevel} ${zenNum[1]}`;
        }
      }

      if (doLink) {
        line = line.replace(
          /(?<!\()(?<!\[)(https?:\/\/[^\s\)]+)/g,
          (url) => `[${url}](${url})`
        );
      }

      return line;
    });

    if (doBlank) {
      const compressed = [];
      let blankCount = 0;
      for (const ln of lines) {
        if (ln.trim() === '') {
          blankCount++;
          if (blankCount === 1) compressed.push('');
        } else {
          blankCount = 0;
          compressed.push(ln);
        }
      }
      lines = compressed;
    }

    while (lines.length > 0 && lines[0].trim() === '') lines.shift();
    while (lines.length > 0 && lines[lines.length - 1].trim() === '') lines.pop();

    return lines.join('\n');
  }

  function doFormat() {
    const input = document.getElementById('inputArea').value;
    if (!input.trim()) {
      setStatus('info', 'テキストを入力してください');
      clearStats();
      return;
    }
    const result = formatMarkdown(input);
    lastFormatted = result;

    // Update raw output
    const rawEl = document.getElementById('outputRaw');
    rawEl.textContent = result;
    rawEl.classList.remove('placeholder');

    if (currentView === 'preview') {
      document.getElementById('outputPreview').innerHTML = renderMarkdown(result);
    }

    // Stats
    const lineCount    = result.split('\n').length;
    const charCount    = result.replace(/\n/g, '').length;
    const headingCount = (result.match(/^#{1,6} /gm) || []).length;
    const bulletCount  = (result.match(/^- /gm) || []).length;

    document.getElementById('statLines').textContent    = `${lineCount} 行`;
    document.getElementById('statChars').textContent    = `${charCount} 字`;
    document.getElementById('statHeadings').textContent = `見出し ${headingCount}`;
    document.getElementById('statBullets').textContent  = `箇条書き ${bulletCount}`;

    setStatus('ok', `整形完了`);
  }

  function clearStats() {
    ['statLines','statChars','statHeadings','statBullets'].forEach(id => {
      const el = document.getElementById(id);
      if (id === 'statHeadings') el.textContent = '見出し 0';
      else if (id === 'statBullets') el.textContent = '箇条書き 0';
      else el.textContent = '—';
    });
  }

  function setStatus(type, text) {
    const el = document.getElementById('statusMsg');
    el.className = 'status-msg' + (type === 'ok' ? ' ok' : type === 'err' ? ' err' : '');
    el.textContent = text;
  }

  // Input stats (live)
  document.getElementById('inputArea').addEventListener('input', () => {
    const val = document.getElementById('inputArea').value;
    const lines = val ? val.split('\n').length : 0;
    const chars = val.replace(/\n/g, '').length;
    document.getElementById('inputStats').textContent = lines > 0 ? `${lines} 行 · ${chars} 字` : '';
    clearTimeout(debTimer);
    debTimer = setTimeout(doFormat, 500);
  });

  let debTimer;
  document.getElementById('btnFormat').addEventListener('click', doFormat);

  // ===== Simple Markdown renderer =====
  function renderMarkdown(md) {
    let html = escHtml(md);

    html = html.replace(/```([^`\n]*)\n([\s\S]*?)```/gm, (_, lang, code) =>
      `<pre><code>${code.trimEnd()}</code></pre>`
    );
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/~~([^~]+)~~/g, '<del>$1</del>');
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    html = html.replace(/^---$/gm, '<hr>');
    html = html.replace(/^&gt; (.+)/gm, '<blockquote>$1</blockquote>');
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    html = html.replace(/^###### (.+)$/gm, '<h6>$1</h6>');
    html = html.replace(/^##### (.+)$/gm,  '<h5>$1</h5>');
    html = html.replace(/^#### (.+)$/gm,   '<h4>$1</h4>');
    html = html.replace(/^### (.+)$/gm,    '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm,     '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm,      '<h1>$1</h1>');

    const listLines = html.split('\n');
    const out = [];
    let inUl = false, inOl = false;
    for (const line of listLines) {
      if (/^- (.+)/.test(line)) {
        if (!inUl) { out.push('<ul>'); inUl = true; }
        if (inOl)  { out.push('</ol>'); inOl = false; }
        out.push('<li>' + line.replace(/^- /, '') + '</li>');
      } else if (/^\d+\. (.+)/.test(line)) {
        if (!inOl) { out.push('<ol>'); inOl = true; }
        if (inUl)  { out.push('</ul>'); inUl = false; }
        out.push('<li>' + line.replace(/^\d+\. /, '') + '</li>');
      } else {
        if (inUl) { out.push('</ul>'); inUl = false; }
        if (inOl) { out.push('</ol>'); inOl = false; }
        if (line.trim() && !line.startsWith('<')) {
          out.push('<p>' + line + '</p>');
        } else {
          out.push(line);
        }
      }
    }
    if (inUl) out.push('</ul>');
    if (inOl) out.push('</ol>');

    return out.join('\n');
  }

  function escHtml(s) {
    return s
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ===== Copy (header) =====
  document.getElementById('btnCopyHeader').addEventListener('click', async () => {
    if (!lastFormatted) return;
    try {
      await navigator.clipboard.writeText(lastFormatted);
      const btn = document.getElementById('btnCopyHeader');
      btn.classList.add('copied');
      btn.textContent = '✓ コピー完了';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.5"/></svg>コピー`;
      }, 1800);
    } catch {
      setStatus('err', 'クリップボードへのコピーに失敗しました');
    }
  });

  // ===== Copy HTML =====
  document.getElementById('btnCopyHtml').addEventListener('click', async () => {
    if (!lastFormatted) return;
    const html = renderMarkdown(lastFormatted);
    try {
      await navigator.clipboard.writeText(html);
      const btn = document.getElementById('btnCopyHtml');
      const orig = btn.textContent;
      btn.textContent = '✓ 完了';
      btn.style.borderColor = 'var(--success)';
      btn.style.color = 'var(--success)';
      setTimeout(() => {
        btn.textContent = orig;
        btn.style.borderColor = '';
        btn.style.color = '';
      }, 1800);
    } catch {
      setStatus('err', 'クリップボードへのコピーに失敗しました');
    }
  });

  // ===== Download =====
  document.getElementById('btnDownload').addEventListener('click', () => {
    if (!lastFormatted) return;
    const blob = new Blob([lastFormatted], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'formatted.md';
    a.click();
    URL.revokeObjectURL(url);
  });

  // ===== Clear =====
  document.getElementById('btnClear').addEventListener('click', () => {
    document.getElementById('inputArea').value = '';
    const rawEl = document.getElementById('outputRaw');
    rawEl.innerHTML = '<span class="placeholder">整形結果がここに表示されます</span>';
    document.getElementById('outputPreview').innerHTML = '';
    document.getElementById('inputStats').textContent = '';
    lastFormatted = '';
    clearStats();
    setStatus('info', 'クリアしました');
  });

  // ===== Paste =====
  document.getElementById('btnPaste').addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById('inputArea').value = text;
      doFormat();
    } catch {
      setStatus('err', 'クリップボードの読み取りに失敗しました');
    }
  });

  // ===== Insert toolbar =====
  document.querySelectorAll('.ins-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const ta  = document.getElementById('inputArea');
      const ins = btn.dataset.insert;
      const start = ta.selectionStart;
      const end   = ta.selectionEnd;
      ta.value = ta.value.slice(0, start) + ins + ta.value.slice(end);
      const pos = start + ins.length;
      ta.setSelectionRange(pos, pos);
      ta.focus();
      doFormat();
    });
  });

  // ===== Sample =====
  const SAMPLE = `チームてちおのAI活用事例

1. はじめに
・このドキュメントはサンプルです
・Markdown整形ツールの動作確認用

2. 主な機能
（1）見出し自動検出
番号付きの行が自動でMarkdown見出しに変換されます。

（2）箇条書き変換
□ ビュレット記号を統一
▶ ・や□など様々な記号をサポート
✅ チェックリストも対応

3. 使い方
テキストをペーストして「整形する」を押すだけです。
URLは自動でリンクになります: https://github.com/techio-code

4. まとめ
AI時代の情報整理に役立ててください。`;

  document.getElementById('btnExample').addEventListener('click', () => {
    document.getElementById('inputArea').value = SAMPLE;
    doFormat();
  });

  // ===== Init =====
  updateOutputView();
</script>
</body>
</html>
